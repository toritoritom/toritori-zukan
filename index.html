function compressImage(file,maxW=1200,quality=0.78){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/Math.max(img.width,img.height));
        const canvas=document.createElement("canvas");
        canvas.width=img.width*scale; canvas.height=img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// EXIFデータを読み取って整形
async function extractExif(file) {
  try {
    const exif = await window.exifr.parse(file);
    if (!exif) return null;
    const camera = [exif.Make, exif.Model].filter(Boolean).join(" ") || null;
    const lens   = exif.LensModel || exif.Lens || null;
    const f      = exif.FNumber ? `F${exif.FNumber}` : null;
    const ss     = exif.ExposureTime
      ? (exif.ExposureTime < 1 ? `1/${Math.round(1/exif.ExposureTime)}秒` : `${exif.ExposureTime}秒`)
      : null;
    const ev     = (exif.ExposureCompensation != null && exif.ExposureCompensation !== undefined)
      ? `${exif.ExposureCompensation > 0 ? "+" : ""}${exif.ExposureCompensation}`
      : null;
    const fl     = exif.FocalLength ? `${Math.round(exif.FocalLength)}mm` : null;
    const isoVal = exif.ISO || exif.ISOSpeedRatings || exif.PhotographicSensitivity;
    const iso    = isoVal ? `ISO${isoVal}` : null;
    if (!camera && !lens && !f && !ss) return null;
    return { camera, lens, f, ss, ev, fl, iso };
  } catch(e) { console.warn("EXIF読み取り失敗:", e); return null; }
}
async function uploadOriginal(file) {
  const ext = file.name.split(".").pop() || "jpg";
  const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const { error } = await supabase.storage.from("bird-photos").upload(path, file, { upsert: false });
  if (error) return null;
  const { data } = supabase.storage.from("bird-photos").getPublicUrl(path);
  return data.publicUrl;
}

function AllObsView({ allObs, loading, totalObs, CATEGORIES, onBack, onSelectSpecies }) {
  const [filterAuthor, setFilterAuthor] = useState("");
  const authors = [...new Set(allObs.map(o=>o.author).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ja"));
  const filteredObs = filterAuthor ? allObs.filter(o=>o.author===filterAuthor) : allObs;
  const grouped = {};
  for (const obs of filteredObs) {
    const key = `${obs.category}__${obs.species}`;
    if (!grouped[key]) grouped[key] = { catId:obs.category, species:obs.species, count:0, hasPhoto:false };
    grouped[key].count++;
    if (obs.photos?.length>0) grouped[key].hasPhoto=true;
  }
  const entries = Object.values(grouped).sort((a,b)=>b.count-a.count);
  const catLabel = (catId) => CATEGORIES.find(c=>c.id===catId)?.label||catId;
  const btnStyle = (active) => ({
    padding:"5px 14px", borderRadius:"20px", border:"1.5px solid",
    borderColor: active?"#7A9B6A":"#C8BC9E",
    background: active?"#E8F0E4":"#FBF8F0",
    color: active?"#3A6B2A":"#6A5A3A",
    fontSize:"12px", cursor:"pointer", fontFamily:"'Noto Serif JP',serif"
  });
  return (
    <>
      <div className="page-hdr">
        <button className="back-btn" onClick={onBack}>← トップに戻る</button>
        <div className="page-title">観察記録一覧</div>
        <div className="page-sub">{filterAuthor ? `${filterAuthor}の記録 ${entries.length}種` : `全 ${totalObs} 件 · 種名をタップして詳細を確認`}</div>
      </div>
      {authors.length > 0 && (
        <div style={{padding:"10px 18px 4px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
          <button style={btnStyle(!filterAuthor)} onClick={()=>setFilterAuthor("")}>全員</button>
          {authors.map(a=>{
            const speciesCount = new Set(allObs.filter(o=>o.author===a).map(o=>`${o.category}__${o.species}`)).size;
            return (
              <button key={a} style={btnStyle(filterAuthor===a)} onClick={()=>setFilterAuthor(a)}>
                {a} <span style={{fontSize:"10px",opacity:.8}}>{speciesCount}種</span>
              </button>
            );
          })}
        </div>
      )}
      {loading ? <div className="loading">読み込み中…</div>
      : entries.length===0
        ? <div className="empty">記録がありません</div>
        : (
          <div className="sp-list">
            {entries.map((e,i)=>(
              <div key={i} className="sp-item" onClick={()=>onSelectSpecies(e.catId, e.species)}>
                <div>
                  <span className="sp-name">{e.hasPhoto?"📷 ":""}{e.species}</span>
                  <div style={{fontSize:"10px",color:"#8A7A5A",marginTop:"2px"}}>{catLabel(e.catId)}</div>
                </div>
                <span className="sp-cnt">{e.count}件</span>
              </div>
            ))}
          </div>
        )
      }
    </>
  );
}

              onChange={e=>setNewPwInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") handlePwChange(); }} />
            {pwChangeMsg && <div style={{fontSize:"12px",color:"#4A6B3C",marginBottom:"8px"}}>{pwChangeMsg}</div>}
            <button className="admin-login-btn" onClick={handlePwChange}>変更する</button>
            <button className="admin-cancel-btn" onClick={()=>{ setShowPwChange(false); setNewPwInput(""); setPwChangeMsg(""); }}>キャンセル</button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
